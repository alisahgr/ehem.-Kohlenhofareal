<!DOCTYPE html>
<html lang="de">
<head>
 <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ehem. Kohlenhofareal Grombühl</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gelb: 244, 210, 66;
      --rot: 196, 95, 63;
      --lachs: 255, 192, 192;
      --rosa: 242, 156, 195;
      --lila: 207, 203, 232;
      --blau: 128, 176, 232;
      --grün1: 137, 142, 70;
      --grün2: 214, 211, 95;
      --türkis: 0, 132, 113;
      --white: #FFFFFF;
      --off-white: #F5F3EE;
      --dark: #1a1a1a;
      --gray: #888;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
      color: var(--dark);
      overflow-x: hidden;
    }


   /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      background: transparent;
      transition: background .3s;
    }
    nav.scrolled { 
      background: rgba(255,255,255,.50); 
      backdrop-filter: blur(14px); 
    }
    .nav-logo { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      text-decoration: none; 
    }
    .logo-mark { 
      width: 34px; 
      height: 34px; 
      background: rgba(var(--grün2), 1); 
      border-radius: 50%; 
      flex-shrink: 0; 
    }
    .logo-text {
      font-family: 'Archivo Black', sans-serif; 
      font-size: 1rem;
      color: rgba(var(--grün2), 1); 
      letter-spacing: .07em; 
      line-height: 1.15;
    }
    .nav-links { 
      display: flex; 
      gap: 32px; 
      list-style: none; 
      align-items: center; 
    }
    .nav-links a {
      color: rgba(var(--grün2), 1); 
      text-decoration: none;
      font-size: 1rem; 
      font-weight: 400; 
      letter-spacing: .06em;
      text-transform: uppercase; 
      position: relative;
    }
    .nav-links a::after {
      content: ''; 
      position: absolute; 
      bottom: -3px; 
      left: 0; 
      right: 0;
      height: 1px; 
      background: rgba(var(--grün2), 1);
      transform: scaleX(0); 
      transition: transform .25s;
    }
    .nav-links a:hover::after { 
      transform: scaleX(1); 
    }
    .dropdown { 
      position: relative; 
    }
    .dropdown-menu {
      display: none; 
      position: absolute; 
      top: 160%; 
      left: 0;
      background: rgba(var(--rosa), 1); 
      min-width: 170px;
    }
    .dropdown-menu::before {
      content: '';
      position: absolute;
      top: -20px;        
      left: 0; right: 0;
      height: 20px;      
      background: transparent;
    }
    .dropdown:hover .dropdown-menu { 
      display: block; 
    }
    .dropdown-menu a {
      display: block; 
      padding: 8px 18px; 
      font-size: 1rem;
      text-transform: none; 
      letter-spacing: 0; 
      color: rgba(var(--grün2), 1);
    }
    .dropdown-menu a::after { 
      display: none; 
    }
    .dropdown-menu a:hover { 
      background: rgba(var(--grün2), 1); 
      color: rgba(var(--rosa), 1); 
      text-decoration: underline; 
    }
    .nav-cta {
      background: var(--white) !important; 
      color: var(--white) !important;
      padding: 10px 22px !important;
    }
    .nav-cta::after { 
      display: none !important; 
    }
    .nav-cta:hover { 
      background: #c9461a !important; 
    }
    .hamburger { 
      display: none; 
      flex-direction: column; 
      gap: 5px; cursor: pointer;
      background: none; 
      border: none;   
      padding: 4px; 
    }
    .hamburger span { 
      width: 26px; 
      height: 2px; 
      background: var(--white); 
      display: block; 
      transition: .3s; 
    }


    /* ── DATENSCHUTZ ── */
    .datenschutz-section {
      background: rgba(var(--rosa), 0.25);
      min-height: 100vh;
      padding: 120px 48px 80px;
    }
    .datenschutz-section h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(4rem, 8vw, 8rem);
      color: rgba(var(--rosa), 1);
      text-transform: uppercase;
      line-height: .95;
      margin-top: 250px;
      margin-bottom: 250px;
    }
    .datenschutz-text {
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .datenschutz-text p {
      font-size: 1.2rem;
      color: rgba(var(--rosa), 1);
      line-height: 1.7;
      font-weight: 400;
    }
    .datenschutz-text a {
      color: rgba(var(--rosa), 1);
    }

    @media (max-width: 600px) {
      .datenschutz-section { padding: 100px 24px 60px; }
      .datenschutz-section h1 { margin-bottom: 60px; }
    }


    /* ── FOOTER NEU ── */
    .footer-neu {
      background-color: rgba(var(--rosa), 1);
      padding: 80px 48px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 100vh;
      justify-content: space-between;
    }
    .footer-neu-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      margin-bottom: 60px;
    }
    .footer-neu-logo .logo-mark {
      width: 52px;
      height: 52px;
      background: rgba(var(--grün2), 1);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .footer-neu-logo .logo-text {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.1rem;
      color: var(--white);
      letter-spacing: .07em;
      line-height: 1.15;
      text-align: left;
    }
    .footer-neu-nav {
      list-style: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: auto;
    }
    .footer-neu-nav a {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--white);
      text-decoration: none;
      letter-spacing: .02em;
      transition: color .2s;
    }
    .footer-neu-nav a:hover {
      color: rgba(var(--grün2), 1);
      text-decoration: underline;
    }
    .footer-neu-legal {
      display: flex;
      gap: 32px;
      margin-top: 60px;
    }
    .footer-neu-legal a {
      color: rgba(255,255,255,.6);
      text-decoration: none;
      font-size: .9rem;
      transition: color .2s;
    }
    .footer-neu-legal a:hover {
      color: var(--white);
    }

    @media (max-width: 600px) {
      .footer-neu { padding: 60px 24px 40px; }
      .footer-neu-nav a { font-size: 1.8rem; }
    }
  </style>
</head>

<script>
  // Sticky nav
  const nav = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 60);
  });

  // Scroll-reveal
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.13 });
  document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

  // Mobile nav
  const hamburger = document.getElementById('hamburger');
  const links = document.getElementById('navLinks');
  let open = false;
  hamburger.addEventListener('click', () => {
    open = !open;
    if (open) {
      links.style.cssText = `
        display:flex; flex-direction:column; position:fixed; inset:0;
        background:rgba(26,0,50,.97); align-items:center; justify-content:center;
        gap:28px; z-index:99; padding:40px;
      `;
    } else {
      links.style.cssText = '';
    }
  });

// Slideshow
  const slides = document.querySelectorAll('.slide');
  let current = 0;

  // Erstes Bild sofort sichtbar
  slides[0].classList.add('active');

  setInterval(() => {
    const next = (current + 1) % slides.length;

    // Nächstes Bild von rechts bereitstellen
    slides[next].style.transform = 'translateX(100%)';
    slides[next].style.transition = 'none';
    slides[next].classList.add('active');

    // Kurz warten dann beide animieren
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        slides[next].style.transition = 'transform .8s ease-in-out';
        slides[next].style.transform = 'translateX(0%)';
        slides[current].style.transition = 'transform .8s ease-in-out';
        slides[current].style.transform = 'translateX(-100%)';
      });
    });

    // Altes Bild nach Animation aufräumen
    setTimeout(() => {
      slides[current].classList.remove('active');
      slides[current].style.transform = 'translateX(100%)';
      slides[current].style.transition = 'none';
      current = next;
    }, 850);

  }, 5000);
</script>
